trigger:
  branches:
    include: [main]

pr:
  branches:
    include: [main]

pool:
  vmImage: ubuntu-latest

variables:
  - group: freyr-sales-ci
  - name: nodeVersion
    value: '20.x'

stages:
  - stage: Verify
    jobs:
      - job: Quality
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
          - script: npm ci
            displayName: Install locked dependencies
          - script: npm run typecheck
            displayName: Type check
          - script: npm run lint
            displayName: Lint
          - script: npm audit --omit=dev --audit-level=high
            displayName: Production dependency audit
          - script: npm run build
            displayName: Production build
          - script: npx playwright install --with-deps chromium
            displayName: Install browser
          - script: npm run test:smoke
            displayName: Smoke tests

  - stage: Deploy
    dependsOn: Verify
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildAndDeploy
        steps:
          - task: AWSShellScript@1
            displayName: Build, push, and deploy to AWS ECS
            inputs:
              awsCredentials: freyr-sales-aws
              regionName: $(AWS_REGION)
              scriptType: inline
              inlineScript: |
                set -euo pipefail

                TAG=$(echo "$(Build.SourceVersion)" | cut -c1-7)
                IMAGE="$(ECR_REGISTRY)/$(ECR_REPO)"

                aws ecr get-login-password --region "$(AWS_REGION)" \
                  | docker login --username AWS --password-stdin "$(ECR_REGISTRY)"

                docker build --platform linux/amd64 \
                  --build-arg NEXT_PUBLIC_SUPABASE_URL="$(NEXT_PUBLIC_SUPABASE_URL)" \
                  --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$(NEXT_PUBLIC_SUPABASE_ANON_KEY)" \
                  -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
                docker push "$IMAGE:$TAG"
                docker push "$IMAGE:latest"

                TD=$(aws ecs describe-task-definition \
                  --task-definition "$(TASK_FAMILY)" \
                  --query taskDefinition \
                  --output json)

                echo "$TD" | jq \
                  --arg IMG "$IMAGE:$TAG" \
                  --arg VER "$(Build.SourceVersion)" '
                  def set_env($name; $value):
                    .containerDefinitions[0].environment = (
                      ((.containerDefinitions[0].environment // [])
                        | map(select(.name != $name)))
                      + [{name: $name, value: $value}]
                    );
                  .containerDefinitions[0].image = $IMG
                  | set_env("APP_VERSION"; $VER)
                  | set_env("DEFAULT_DATA_MODE"; "mock")
                  | set_env("DATA_MODE_LOCKED"; "0")
                  | del(
                      .taskDefinitionArn,
                      .revision,
                      .status,
                      .requiresAttributes,
                      .compatibilities,
                      .registeredAt,
                      .registeredBy
                    )
                ' > taskdef.json

                REV=$(aws ecs register-task-definition \
                  --cli-input-json file://taskdef.json \
                  --query taskDefinition.revision \
                  --output text)

                aws ecs update-service \
                  --cluster "$(ECS_CLUSTER)" \
                  --service "$(ECS_SERVICE)" \
                  --task-definition "$(TASK_FAMILY):$REV" \
                  --force-new-deployment

                aws ecs wait services-stable \
                  --cluster "$(ECS_CLUSTER)" \
                  --services "$(ECS_SERVICE)"
